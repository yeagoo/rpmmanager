# RPM Manager Configuration
#
# Architecture:
#   rpmmanager (8080) — Admin backend only (internal)
#   Caddy (80/443)    — Public repo file server
#
# Admin panel is NOT exposed to the public internet.
# Users download packages through Caddy, which serves repo_root directly.
#
server:
  listen: "127.0.0.1:8080"     # Admin backend, localhost only
  base_url: "https://rpms.example.com"   # Public URL served by Caddy

auth:
  username: "admin"
  password_hash: ""       # Auto-generated on first run
  api_token: ""           # Auto-generated on first run
  jwt_secret: ""          # Auto-generated on first run

database:
  path: "./data/rpmmanager.db"

storage:
  repo_root: "./data/repos"
  build_logs: "./data/logs"
  temp_dir: "./data/tmp"

gpg:
  home_dir: "./data/gnupg"

tools:
  nfpm_path: "nfpm"
  createrepo_path: "createrepo_c"
  gpg_path: "gpg"
  rpm_path: "rpm"
  rpmlint_path: "rpmlint"

monitor:
  enabled: true
  default_interval: "6h"
  github_token: ""

log:
  level: "info"
  format: "text"

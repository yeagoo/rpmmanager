name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build

      - name: Embed frontend
        run: |
          rm -rf internal/embed/dist
          cp -r web/dist internal/embed/dist

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA::8}"

          echo "Building v${VERSION} (${GITHUB_SHA::8})..."

          # linux/amd64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="${LDFLAGS}" -o dist/rpmmanager-linux-amd64 ./cmd/rpmmanager

          # linux/arm64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags="${LDFLAGS}" -o dist/rpmmanager-linux-arm64 ./cmd/rpmmanager

      - name: Create checksums
        working-directory: dist
        run: sha256sum rpmmanager-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/rpmmanager-linux-amd64
            dist/rpmmanager-linux-arm64
            dist/checksums.txt

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

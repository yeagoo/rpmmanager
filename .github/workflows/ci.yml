name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ── Go backend checks ──────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go mod verify
        run: go mod verify

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/rpmmanager

      - name: Go test
        run: go test -race -count=1 ./...

  # ── Frontend checks ─────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

  # ── Full production build (frontend → embed → Go binary) ───────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build

      - name: Embed frontend
        run: |
          find internal/embed/dist -mindepth 1 ! -name '.gitkeep' -delete 2>/dev/null || true
          cp -r web/dist/* internal/embed/dist/

      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/rpmmanager ./cmd/rpmmanager

      - name: Verify binary
        run: ./bin/rpmmanager version || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpmmanager-linux-amd64
          path: bin/rpmmanager
          retention-days: 7

  # ── Docker build ────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          tags: rpmmanager:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

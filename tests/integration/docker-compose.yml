# Integration test stack
# Usage: docker compose -f tests/integration/docker-compose.yml up --build -d

services:
  # ── RPM Manager (system under test) ──────────────────────────────
  rpmmanager:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: inttest-rpmmanager
    command: ["serve"]
    environment:
      - RPMMANAGER_SERVER_LISTEN=0.0.0.0:8080
      - RPMMANAGER_SERVER_BASE_URL=http://repo
      - RPMMANAGER_AUTH_API_TOKEN=${RPMMANAGER_AUTH_API_TOKEN}
      - RPMMANAGER_LOG_LEVEL=debug
    volumes:
      - app-data:/data
    ports:
      - "18080:8080"
    networks:
      - inttest

  # ── Test binary server ───────────────────────────────────────────
  testserver:
    build:
      context: testdata/testapp
      dockerfile: Dockerfile
    container_name: inttest-testserver
    networks:
      - inttest

  # ── Repo file server (serves built RPMs to distro containers) ───
  repo:
    image: nginx:1-alpine
    container_name: inttest-repo
    volumes:
      - app-data:/app-data:ro
    command: >
      sh -c 'echo "server { listen 80; root /app-data/repos; autoindex on; }" > /etc/nginx/conf.d/default.conf && nginx -g "daemon off;"'
    ports:
      - "18081:80"
    networks:
      - inttest

volumes:
  app-data:

networks:
  inttest:
    name: inttest
